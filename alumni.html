        .alumni-quote {

<script src="_shared.js"></script>
<script>
const alumni = [
    { name: "Айгерим Нуралиева", region: "USA", university: "MIT", degree: "BS Computer Science", year: 2021, role: "Software Engineer at Google", achievements: ["Google Scholarship", "Dean's List", "Hackathon Winner"], avatar: "👩‍💻", quote: "MIT дал мне не просто образование, а семью инженеров, которые думают о том, как менять мир." },
    { name: "Ерасыл Байбосынов", region: "USA", university: "Stanford", degree: "MS Electrical Engineering", year: 2022, role: "Hardware Engineer at Tesla", achievements: ["Graduate Fellowship", "Published Researcher", "Patent Holder"], avatar: "👨‍🔬", quote: "Silicon Valley всегда мне казался недостижимым, но Stanford открыл двери в его сердце." },
    { name: "Жания Кенесбаева", region: "UK", university: "Oxford", degree: "MBA", year: 2023, role: "Management Consultant at McKinsey", achievements: ["Rhodes Scholarship", "Debate Captain", "Oxford Prize"], avatar: "👩‍💼", quote: "Oxford — это не только обучение, это вход в глобальную сеть влияния и дружбы." },
    { name: "Дарын Сейтов", region: "EU", university: "ETH Zurich", degree: "MSc Physics", year: 2022, role: "Physicist at CERN", achievements: ["CERN Fellowship", "Patent", "Published 5 Papers"], avatar: "👨‍🔬", quote: "В ETH я понял, что наука — это не карьера, это призвание, которое объединяет человечество." },
    { name: "Амина Абдулхалимова", region: "USA", university: "Harvard", degree: "MD", year: 2024, role: "Resident Physician at Johns Hopkins", achievements: ["Scholarship", "Research Fellow", "Award"], avatar: "👩‍⚕️", quote: "Harvard Medical School помог мне осознать, что врача требует не просто знание, а сострадание и наука." },
    { name: "Максим Петров", region: "Canada", university: "University of Toronto", degree: "BS Mathematics", year: 2021, role: "Quantitative Analyst at Jane Street", achievements: ["Scholarship", "Putnam Fellow", "Internship Winner"], avatar: "👨‍💻", quote: "Toronto дал мне фундамент в математике, который открыл двери на Wall Street." },
    { name: "Сара Мухаметова", region: "Asia", university: "NUS Singapore", degree: "BS Computer Science", year: 2022, role: "Product Manager at Bytedance", achievements: ["NUS Scholarship", "Hackathon Winner", "Startup Founder"], avatar: "👩‍💻", quote: "NUS соединила мен интеллекты Азии. Дружба, которую я получил, ценнее диплома." },
    { name: "Азамат Коспеков", region: "EU", university: "Technical University of Munich", degree: "MSc Computer Science", year: 2023, role: "ML Engineer at Zalando", achievements: ["TUM Excellence Fellowship", "Published 2 Papers", "Patent"], avatar: "👨‍💻", quote: "TUM показал мне, что немецкая инженерия — это реальность, которая меняет мир каждый день." },
    { name: "Лера Артаева", region: "UK", university: "Imperial College London", degree: "MSc Materials Science", year: 2023, role: "Materials Scientist at Shell", achievements: ["Imperial Scholarship", "Research Award", "Published"], avatar: "👩‍🔬", quote: "Imperial — это не просто университет, это место, где наука коснулась меня на уровне души." },
    { name: "Денис Мартынов", region: "USA", university: "Carnegie Mellon", degree: "BS Computer Science", year: 2021, role: "Senior Engineer at Meta", achievements: ["Scholarship", "Hackathon Champion", "Startup Experience"], avatar: "👨‍💻", quote: "CMU научил меня думать как на 10 шагов вперед, не забывая о настоящем моменте." },
];

const grid = document.getElementById('alumniGrid');
const searchInput = document.getElementById('alumniSearch');
const filterTags = document.querySelectorAll('.filter-tag');

let currentFilter = 'all';

function renderAlumni(data) {
    grid.innerHTML = '';

    if (data.length === 0) {
        grid.innerHTML = '<div class="no-results">No alumni found. Try adjusting your search.</div>';
        return;
    }

    data.forEach(person => {
        const card = document.createElement('div');
        card.className = 'alumni-card';

        card.innerHTML = `
            <div class="alumni-header">
                <div class="alumni-avatar">${person.avatar}</div>
                <div class="alumni-name">${person.name}</div>
                <div class="alumni-university">${person.university}</div>
            </div>
            <div class="alumni-body">
                <div class="alumni-info">
                    <div class="info-item">
                        <div class="info-icon">🎓</div>
                        <div class="info-content">
                            <div class="info-label">Degree</div>
                            <div class="info-value">${person.degree}</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">💼</div>
                        <div class="info-content">
                            <div class="info-label">Current Role</div>
                            <div class="info-value">${person.role}</div>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon">📅</div>
                        <div class="info-content">
                            <div class="info-label">Graduated</div>
                            <div class="info-value">${person.year}</div>
                        </div>
                    </div>
                </div>

                <div class="achievement-tags">
                    ${person.achievements.map(ach => `<span class="achievement-tag">${ach}</span>`).join('')}
                </div>

                <blockquote class="alumni-quote">"${person.quote}"</blockquote>
            </div>
        `;

        grid.appendChild(card);
    });
}

function filterAlumni() {
    const searchTerm = searchInput.value.toLowerCase();

    const filtered = alumni.filter(person => {
        const matchFilter = currentFilter === 'all' || person.region === currentFilter;
        const matchSearch = !searchTerm || 
                          person.university.toLowerCase().includes(searchTerm) ||
                          person.name.toLowerCase().includes(searchTerm) ||
                          person.role.toLowerCase().includes(searchTerm);
        return matchFilter && matchSearch;
    });

    renderAlumni(filtered);
}

// Filter tags
filterTags.forEach(tag => {
    tag.addEventListener('click', function() {
        filterTags.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        filterAlumni();
    });
});

// Search
searchInput.addEventListener('input', filterAlumni);
searchInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') filterAlumni();
});

// Initialize
renderAlumni(alumni);
</script>
