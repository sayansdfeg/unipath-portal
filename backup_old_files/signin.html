<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #1e1e1e; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid #333; }
        h2 { font-size: 1.8rem; color: #fff; margin-bottom: 0.5rem; text-align: center; }
        p.subtitle { color: #a0a0a0; font-size: 0.9rem; text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #ccc; }
        input { width: 100%; padding: 0.75rem; border-radius: 6px; border: 1px solid #444; background-color: #2c2c2c; color: #fff; font-size: 1rem; transition: 0.3s; }
        input:focus { outline: none; border-color: #bb86fc; background-color: #333; }
        .submit-btn { width: 100%; padding: 0.85rem; border: none; border-radius: 6px; background-color: #bb86fc; color: #121212; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .submit-btn:hover { background-color: #9e67e3; }
        .form-footer { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: #a0a0a0; }
        .form-footer a { color: #bb86fc; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

<div class="container"> 
    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your details</p>

    <form id="signinForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="••••••••" required>
        </div>

        <button class="submit-btn" type="submit">Sign in</button>
    </form>

    <div class="form-footer">
        <p>Don't have an account? <a href="registerpage.php">Sign Up</a></p>
    </div>
</div>

<script>
document.getElementById('signinForm').addEventListener('submit', function(event) {
    // 1. Сразу останавливаем отправку
    event.preventDefault();

    // 2. Собираем данные
    var formData = new FormData(this);

    // 3. Отправляем запрос
    fetch('authentication.php', {
        method: 'POST',
        body: formData
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        console.log('Ответ сервера:', data);
        if (data.success === true) {
            // Если всё ок, переходим на главную
            window.location.href = 'mainpage.php';
        } else {
            // Если ошибка (неверный пароль и т.д.), выводим текст ошибки
            alert(data.message || 'Ошибка входа');
        }
    })
    .catch(function(error) {
        console.error('Ошибка:', error);
        alert('Сервер вернул странный ответ. Проверьте консоль (F12).');
    });
});
</script>

</body>
</html>
